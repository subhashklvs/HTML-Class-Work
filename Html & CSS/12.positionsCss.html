<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position IN css</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            background-color: cornflowerblue;
            font-family: Arial, Helvetica, sans-serif;
            margin: 10px;
            padding: 10px;
            
        }
        .position{
            width: 30%;
            height: 30%;
            margin-bottom: 10px;
            color: aliceblue;
            margin-top: 20px;
        }
        .relative{
            padding: 6px;
            background-color: darkcyan;
            margin-bottom: 20px;
            margin-top: 20px;
            position: relative;
            left: 80px;
        }
        .absolute{
            padding: 6px;
            background-color: burlywood;
            margin-bottom: 20px;
            position: absolute;
            right: 40px;
        }
        .fixed{
            padding: 6px;
            background-color: brown;
            margin-bottom: 20px;
            position: fixed;
            left: 10px;
        }
        .sticky{
            padding: 6px;
            background-color: blueviolet;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
        }
    </style>
</head>
<body>
    <div class="position">
        <div class="relative">Lorem ipsum, dolor sit amet consectetur.</div>
        <div class="absolute"> adipisicing elit. Aspernatur, laborum? </div>
        <div class="fixed">Dicta praesentium illo.</div>
        <div class="sticky">corrupti nihil tenetur beatae esse.</div>
    </div>
</body>
</html>
