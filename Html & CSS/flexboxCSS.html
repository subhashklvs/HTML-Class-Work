<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height:100vh;
        }
        .container{
            background-color:skyblue;
            height:90vh;
            margin:5px;
            padding:5px;
            border:1px solid #dbdbdb;
            text-align:center;
            display:flex;
            flex-wrap:wrap-reverse;
            gap:10px;
            justify-self: center;
            align-items: center;
        }
        .box{
            height:50px;
            width:80px;
            background-color:red;
        
        }
        .box2{
            align-self:flex-start;
        }
        .box4{
            align-self:flex-end;
        }
        .box5{
            flex-grow:1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box box2">2</div>
        <div class="box">3</div>
        <div class="box box4">4</div>
        <div class="box box5">5</div>
        <!--<div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
        <div class="box">10</div>
    </div>
</body>
</html>
