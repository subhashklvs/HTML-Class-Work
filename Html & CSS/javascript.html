<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Website</title>
    <style>
        body{
            background-color:darkcyan;
            height:100vh;
            text-align:center;
            margin:20px;

        }

</head>
<body>
    <button onclick="">Click Me</button>
</body>
<script src="index.js"></script>
</html>
