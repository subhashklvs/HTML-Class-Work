<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Images in Boxes</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:rgb(27, 138, 175);
    height:100vh;
}

.container{
    border:1px solid black;
    padding:20px;
}

.box{
    display:inline-block;
    height:150px;
    width:200px;
    margin:10px;
    border:2px solid rgb(7, 13, 14);
    overflow:hidden;
}

.box img{
    height:100%;
    width:100%;
    object-fit:cover;
}
</style>
</head>
<body>
<h1>Images in Boxes</h1>
<div class="container">
<img src="https://picsum.photos/300/200?1">
<img src="https://picsum.photos/300/200?2">
<img src="https://picsum.photos/300/200?3">
<div class="box">
<img src="https://picsum.photos/300/200?4">
<img src="https://picsum.photos/300/200?5">
</div>
</body>
</html>
