<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">

</head>
<body class="bg-dark text-white">
    <h1 class="text-center">Weather App</h1>

    <div class="container">
        <form class="row">
            <div class="col-12 col-sm-10">
                <input type="text" class="form-control" id="textBox">
            </div>
            <div class="col-12 col-sm-2">
                <button class="btn btn-outline-success w-100" onclick="getData(event);">Search</button>
            </div>
        </form>

        <div class="row" id="ref">
            <!-- hrml data from js -->
        </div>
        <div class="spinner-border" role="status" id="loading" style="display: none;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</body>
</html>
