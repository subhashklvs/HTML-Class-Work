<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        body{
            background-color: darkblue;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            height: 100px;
            background-color: red;
            width: 100px;
            border-radius: 10px;

            transition: background-color transform;
            transition-delay: 0.5s;
            transition-duration: 2s;
            transition-timing-function: ease-in;/*ease ease-in ease-in-out linear*/

        }
        .box:hover{
            background-color: blue;
            transform: scale(0.1);
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
